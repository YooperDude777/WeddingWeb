<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP - Karlee & Tate Wedding</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: white;
    overflow: hidden; /* Remove page scroll */
}

.rsvp-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.rsvp-container iframe {
    width: 100%;
    height: 120vh; /* Make it taller than viewport to cover far */
    max-width: 1200px;
    border: none;
    border-radius: 10px;
}

.back-button {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    background: #8FAF8F;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    z-index: 10; /* Ensure it's above iframe */
}

.back-button:hover {
    background: #6b8f6b;
    transform: translateX(-50%) translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="rsvp-container">
<iframe width="640px" height="480px" src="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=brxxyMZ8V0qk6yIwn8NJY7dY_5m2XNBOrEZFXIw4S_tUMUlHNkJJWFk2VkNJMU82QkdONEpKMVBKTy4u&embed=true" frameborder="0" marginwidth="0" marginheight="0" style="border: none; max-width:100%; max-height:100vh" allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen> </iframe>
</div>

<a href="index.html" class="back-button">Back to Home</a>

</body>
</html>
